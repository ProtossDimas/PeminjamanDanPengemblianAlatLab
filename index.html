<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lab Pengolahan Air dan Limbah Industri - Peminjaman Alat</title>
<script>
  // Terapkan tema sebelum render agar tidak ada efek "flash" warna
  (function(){
    try{
      var t = localStorage.getItem('site-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    }catch(e){}
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
/* ── VARIABLES ─────────────────────────────────────────── */
:root{
  --navy:    #0a1628;
  --blue:    #1046a0;
  --blue-l:  #1a5fcf;
  --teal:    #00d4aa;
  --teal-d:  #00a884;
  --gold:    #f5b731;
  --red:     #ef4444;
  --bg:      #07101f;
  --s1:      rgba(255,255,255,0.035);
  --s2:      rgba(255,255,255,0.07);
  --border:  rgba(255,255,255,0.09);
  --txt:     #dce8fb;
  --muted:   #7a90b2;
  --input-bg:rgba(255,255,255,0.05);
  --r:       13px;
  --font:    'Plus Jakarta Sans', sans-serif;
  --mono:    'JetBrains Mono', monospace;
}

/* ── LIGHT THEME ──────────────────────────────────────── */
:root[data-theme="light"]{
  --blue-l:  #155ec0;
  --teal:    #048a70;
  --teal-d:  #037a63;
  --gold:    #9a6308;
  --red:     #d23030;
  --bg:      #eef2f8;
  --s1:      rgba(10,25,50,0.04);
  --s2:      rgba(10,25,50,0.07);
  --border:  rgba(10,25,50,0.13);
  --txt:     #16213b;
  --muted:   #54627c;
  --input-bg:#ffffff;
}
:root[data-theme="light"] body::before{
  opacity:0.55;
}
:root[data-theme="light"] .land-hero h2{
  background:linear-gradient(135deg,var(--navy) 15%,var(--teal));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
:root[data-theme="light"] select option{background:#ffffff;color:var(--txt)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}

/* ── BACKGROUND ───────────────────────────────────────── */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 90% 55% at 15% -5%,rgba(16,70,160,0.4) 0%,transparent 65%),
    radial-gradient(ellipse 60% 45% at 85% 105%,rgba(0,212,170,0.2) 0%,transparent 60%),
    radial-gradient(ellipse 40% 35% at 50% 50%,rgba(245,183,49,0.06) 0%,transparent 70%);
}

/* ── APP SHELL ────────────────────────────────────────── */
#app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}

/* ── HEADER ───────────────────────────────────────────── */
header{
  background:linear-gradient(135deg,#0d3a8c 0%,#081c3d 65%,#061226 100%);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(45,212,191,0.25);
  padding:14px 20px;
  display:flex;align-items:center;gap:14px;
  position:sticky;top:0;z-index:200;
  box-shadow:0 4px 40px rgba(0,0,0,0.5);
  color:#f3f7ff; /* header selalu di atas background gelap, jadi teks dikunci terang agar tetap jelas di kedua tema */
}
header h1{color:#f3f7ff;letter-spacing:.2px}
.hdr-info p{color:#5eead4!important}

/* Chip admin di dalam header dikunci warnanya supaya tetap jelas di kedua tema */
header .chip-name{color:#ffce5c!important}
header .chip-name.super{color:#fca5a5!important}
header .chip-role{color:rgba(243,247,255,0.6)!important}
header .chip-logout{color:rgba(243,247,255,0.6)!important}
header .chip-logout:hover{color:#fca5a5!important}

.theme-toggle{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);
  color:#eaf1ff;width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;flex-shrink:0;transition:all .2s;
}
.theme-toggle:hover{background:rgba(0,212,170,0.2);border-color:var(--teal)}

.hdr-info{flex:1;min-width:0}
.hdr-info h1{
  font-size:clamp(12px,2.4vw,17px);font-weight:800;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.hdr-info p{font-size:clamp(10px,1.7vw,12px);color:var(--teal);font-weight:600;margin-top:2px}

.hdr-clock{
  font-family:var(--mono);font-size:11px;color:rgba(243,247,255,0.6);
  text-align:right;flex-shrink:0;line-height:1.6;
}

/* ── MAIN ─────────────────────────────────────────────── */
main{flex:1;padding:26px 18px;max-width:860px;width:100%;margin:0 auto}

/* ── LANDING ──────────────────────────────────────────── */
.land-hero{text-align:center;margin-bottom:32px}
.land-hero h2{
  font-size:clamp(18px,4vw,26px);font-weight:800;
  background:linear-gradient(135deg,#fff 20%,var(--teal));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.land-hero p{color:var(--muted);margin-top:8px;font-size:14px}

.menu-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px}
.menu-card{
  background:var(--s1);border:1px solid var(--border);border-radius:var(--r);
  padding:30px 20px;text-align:center;cursor:pointer;
  transition:all .32s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden;
}
.menu-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent,rgba(0,212,170,0.05));
  opacity:0;transition:opacity .3s;
}
.menu-card:hover{transform:translateY(-5px);border-color:var(--teal);box-shadow:0 14px 40px rgba(0,212,170,0.15)}
.menu-card:hover::after{opacity:1}
.menu-card:active{transform:translateY(-1px)}

.micon{
  width:64px;height:64px;border-radius:50%;
  margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:26px;
}
.micon.blue {background:rgba(26,95,207,0.18);color:#7eb3ff;border:1px solid rgba(126,179,255,.3)}
.micon.teal {background:rgba(0,212,170,0.14);color:var(--teal);border:1px solid rgba(0,212,170,.3)}
.micon.gold {background:rgba(245,183,49,0.14);color:var(--gold);border:1px solid rgba(245,183,49,.3)}
.menu-card h3{font-size:15px;font-weight:700;margin-bottom:8px}
.menu-card p{font-size:12px;color:var(--muted);line-height:1.6}

/* ── PAGE HEADER ──────────────────────────────────────── */
.pg-hdr{display:flex;align-items:center;gap:12px;margin-bottom:22px;flex-wrap:wrap}
.btn-back{
  background:var(--s1);border:1px solid var(--border);color:var(--txt);
  width:38px;height:38px;border-radius:9px;cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;
}
.btn-back:hover{background:var(--s2);border-color:var(--teal);color:var(--teal)}
.pg-hdr h2{font-size:19px;font-weight:800}
.pg-hdr .badge-admin{margin-left:auto}

/* ── TABS ─────────────────────────────────────────────── */
.tabs{
  display:flex;gap:4px;background:var(--s1);
  border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:22px;
}
.tab-btn{
  flex:1;padding:9px 12px;border:none;background:transparent;
  color:var(--muted);font-family:var(--font);font-size:13px;font-weight:600;
  border-radius:8px;cursor:pointer;transition:all .2s;
}
.tab-btn.on{background:var(--blue-l);color:#fff;box-shadow:0 2px 12px rgba(26,95,207,.4)}
.tab-btn:hover:not(.on){background:var(--s2);color:var(--txt)}

/* ── CARD ─────────────────────────────────────────────── */
.card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--r);padding:22px;margin-bottom:18px;
}
.card-ttl{
  font-size:12px;font-weight:700;color:var(--teal);
  text-transform:uppercase;letter-spacing:.8px;
  margin-bottom:16px;display:flex;align-items:center;gap:8px;
}

/* ── FORM ─────────────────────────────────────────────── */
.fg{display:flex;flex-direction:column;gap:6px}
.fg label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.fg.full{grid-column:1/-1}

input,select,textarea{
  background:var(--input-bg);border:1px solid var(--border);
  border-radius:8px;color:var(--txt);font-family:var(--font);font-size:14px;
  padding:10px 13px;transition:border-color .2s,box-shadow .2s;outline:none;width:100%;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,212,170,.13);
}
select option{background:#0d1f3a}
textarea{resize:vertical;min-height:76px}

/* Custom select wrapper */
.sel-wrap{position:relative}
.sel-wrap select{padding-right:36px}
.sel-arrow{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  pointer-events:none;color:var(--muted);font-size:12px;
}

/* ── DROPDOWN ITEM PREVIEW ────────────────────────────── */
.item-preview{
  background:rgba(0,212,170,0.06);border:1px solid rgba(0,212,170,0.22);
  border-radius:10px;padding:14px 16px;margin-top:12px;
  animation:fadeUp .25s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ip-name{font-size:15px;font-weight:700;margin-bottom:6px}
.ip-meta{display:flex;flex-wrap:wrap;gap:10px;color:var(--muted);font-size:12px;margin-bottom:10px}
.ip-stok{display:flex;align-items:center;gap:10px}
.ip-stok-num{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--teal)}

/* Admin shortcut inside dropdown */
.opt-admin{color:var(--gold)!important}

/* ── BUTTONS ──────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 22px;border-radius:10px;font-family:var(--font);
  font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;border:none;
}
.btn-p{background:linear-gradient(135deg,var(--blue-l),var(--blue));color:#fff;box-shadow:0 4px 16px rgba(26,95,207,.4)}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(26,95,207,.55)}
.btn-s{background:linear-gradient(135deg,var(--teal),var(--teal-d));color:#07101f;box-shadow:0 4px 16px rgba(0,212,170,.3)}
.btn-s:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(0,212,170,.45)}
.btn-g{background:linear-gradient(135deg,var(--gold),#d4920a);color:#07101f;box-shadow:0 4px 16px rgba(245,183,49,.3)}
.btn-g:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,183,49,.45)}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--txt)}
.btn-o:hover{border-color:var(--teal);color:var(--teal)}
.btn-full{width:100%}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.mt{margin-top:14px}

/* ── BADGES ───────────────────────────────────────────── */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;font-family:var(--mono);
}
.b-ok    {background:rgba(0,212,170,.15);color:var(--teal);border:1px solid rgba(0,212,170,.3)}
.b-warn  {background:rgba(245,183,49,.15);color:var(--gold);border:1px solid rgba(245,183,49,.3)}
.b-err   {background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.b-info  {background:rgba(126,179,255,.15);color:#7eb3ff;border:1px solid rgba(126,179,255,.3)}
.b-admin {background:rgba(245,183,49,.15);color:var(--gold);border:1px solid rgba(245,183,49,.3)}

/* ── TABLE ────────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:rgba(16,70,160,.3)}
th{padding:11px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--teal);
   text-transform:uppercase;letter-spacing:.6px;white-space:nowrap}
td{padding:11px 14px;border-top:1px solid var(--border);vertical-align:middle}
tr:hover td{background:var(--s2)}

/* ── SEARCH BAR ───────────────────────────────────────── */
.srch{display:flex;gap:10px;margin-bottom:16px}
.srch input{flex:1}

/* ── TOAST ────────────────────────────────────────────── */
#toast{position:fixed;bottom:24px;right:20px;z-index:9999;
       display:flex;flex-direction:column;gap:8px;pointer-events:none}
.ti{
  display:flex;align-items:center;gap:10px;
  background:#0f2040;border-radius:12px;padding:13px 18px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);font-size:14px;
  min-width:240px;max-width:340px;pointer-events:all;
  animation:tin .3s cubic-bezier(.34,1.56,.64,1);
  border-left:4px solid var(--teal);
}
.ti.err{border-color:var(--red)}
.ti.wrn{border-color:var(--gold)}
@keyframes tin{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes tout{to{opacity:0;transform:translateX(110%)}}

/* ── MODAL ────────────────────────────────────────────── */
.mdl-bg{
  position:fixed;inset:0;z-index:600;
  background:rgba(0,0,0,.75);backdrop-filter:blur(5px);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.mdl{
  background:#0c1e36;border:1px solid var(--border);border-radius:18px;
  padding:28px;width:100%;max-width:420px;
  box-shadow:0 24px 80px rgba(0,0,0,.6);
  animation:pop .22s cubic-bezier(.34,1.56,.64,1);
}
@keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.mdl h3{font-size:17px;font-weight:800;margin-bottom:6px}
.mdl p {color:var(--muted);font-size:13px;margin-bottom:20px;line-height:1.6}
.mdl-row{display:flex;gap:10px;margin-top:8px}

/* ── SUCCESS BOX ──────────────────────────────────────── */
.success-box{
  background:rgba(0,212,170,.07);border:1px solid rgba(0,212,170,.28);
  border-radius:10px;padding:16px;margin-bottom:18px;
}
.success-box .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.success-box .val{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--teal)}
.success-box .hint{font-size:11px;color:var(--muted);margin-top:5px}

/* ── SPINNER ──────────────────────────────────────────── */
.spin{
  width:34px;height:34px;border:3px solid var(--border);
  border-top-color:var(--teal);border-radius:50%;
  animation:sp .75s linear infinite;margin:36px auto;
}
@keyframes sp{to{transform:rotate(360deg)}}
.ld{text-align:center;padding:36px;color:var(--muted)}

/* ── EMPTY STATE ──────────────────────────────────────── */
.empty{text-align:center;padding:48px;color:var(--muted)}
.empty i{font-size:42px;opacity:.25;display:block;margin-bottom:12px}

/* ── INFO BOX ─────────────────────────────────────────── */
.info-box{
  background:rgba(126,179,255,.06);border:1px solid rgba(126,179,255,.2);
  border-radius:10px;padding:14px 16px;font-size:13px;color:var(--muted);line-height:1.7;
}
.info-box strong{color:var(--txt)}

/* ── FOOTER ───────────────────────────────────────────── */
footer{
  background:rgba(7,16,31,.92);border-top:1px solid var(--border);
  padding:14px 20px;text-align:center;font-size:12px;color:var(--muted);
}
footer span{color:var(--teal)}

/* ── UTILS ────────────────────────────────────────────── */
.hidden{display:none!important}
@media(max-width:480px){
  main{padding:18px 12px}
  .menu-grid{grid-template-columns:1fr}
  .fgrid{grid-template-columns:1fr}
}

/* ── ADMIN SESSION CHIP (header) ───────────────────────── */
#admin-chip{
  display:flex;align-items:center;gap:0;
  background:rgba(245,183,49,0.08);
  border:1px solid rgba(245,183,49,0.3);
  border-radius:99px;
  overflow:hidden;flex-shrink:0;
  animation:chipIn .45s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 0 18px rgba(245,183,49,0.12);
}
@keyframes chipIn{
  from{transform:translateX(60px) scale(.8);opacity:0}
  to  {transform:translateX(0)    scale(1);opacity:1}
}
.chip-avatar{
  width:32px;height:32px;
  background:linear-gradient(135deg,var(--gold),#d4920a);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:#07101f;flex-shrink:0;
}
.chip-avatar.super{
  background:linear-gradient(135deg,#ef4444,#b91c1c);color:#fff;
}
.chip-info{
  padding:0 10px 0 8px;line-height:1.3;
  display:flex;flex-direction:column;justify-content:center;
}
.chip-name{
  font-size:11px;font-weight:800;color:var(--gold);
  font-family:var(--mono);white-space:nowrap;max-width:110px;
  overflow:hidden;text-overflow:ellipsis;
}
.chip-name.super{ color:#f87171; }
.chip-role{
  font-size:9px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.5px;
}
.chip-logout{
  height:100%;padding:0 11px;
  background:transparent;border:none;
  border-left:1px solid rgba(245,183,49,0.25);
  color:var(--muted);cursor:pointer;font-size:11px;
  transition:all .2s;display:flex;align-items:center;gap:5px;
  font-family:var(--font);font-weight:600;white-space:nowrap;
  min-height:34px;
}
.chip-logout:hover{
  background:rgba(239,68,68,0.15);
  color:#f87171;border-left-color:rgba(239,68,68,0.3);
}

/* ── ADMIN FLOATING SESSION BAR (muncul di bawah header) ─── */
#admin-session-bar{
  position:sticky;top:0;z-index:199;
  background:linear-gradient(90deg,
    rgba(13,18,28,0.97) 0%,
    rgba(20,14,0,0.97) 50%,
    rgba(13,18,28,0.97) 100%);
  border-bottom:1px solid rgba(245,183,49,0.22);
  padding:7px 20px;
  display:flex;align-items:center;gap:12px;
  backdrop-filter:blur(12px);
  animation:barDown .35s ease;
  box-shadow:0 4px 20px rgba(245,183,49,0.07);
  flex-wrap:wrap;
}
#admin-session-bar.super-bar{
  background:linear-gradient(90deg,
    rgba(13,18,28,0.97) 0%,
    rgba(25,6,6,0.97) 50%,
    rgba(13,18,28,0.97) 100%);
  border-bottom-color:rgba(239,68,68,0.3);
  box-shadow:0 4px 20px rgba(239,68,68,0.07);
}
@keyframes barDown{
  from{transform:translateY(-100%);opacity:0}
  to  {transform:translateY(0);opacity:1}
}
.sbar-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--gold);flex-shrink:0;
  box-shadow:0 0 8px rgba(245,183,49,0.8);
  animation:pulse 2s ease-in-out infinite;
}
.sbar-dot.super-dot{
  background:#f87171;box-shadow:0 0 8px rgba(239,68,68,0.8);
}
@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1)}
  50%     {opacity:.6;transform:scale(.75)}
}
.sbar-text{
  font-size:12px;color:var(--muted);flex:1;
}
.sbar-text strong{
  color:var(--gold);font-family:var(--mono);font-size:12px;
}
.sbar-text strong.super{ color:#f87171; }
.sbar-badge{
  font-size:9px;font-weight:700;padding:2px 8px;border-radius:99px;
  background:rgba(245,183,49,0.15);color:var(--gold);
  border:1px solid rgba(245,183,49,0.3);
  text-transform:uppercase;letter-spacing:.6px;font-family:var(--mono);
  flex-shrink:0;
}
.sbar-badge.super{
  background:rgba(239,68,68,0.15);color:#f87171;border-color:rgba(239,68,68,.3);
}
.sbar-logout{
  background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,.3);
  color:#f87171;border-radius:8px;padding:5px 12px;
  cursor:pointer;font-size:11px;font-weight:700;
  transition:all .2s;font-family:var(--font);
  display:flex;align-items:center;gap:6px;
  flex-shrink:0;white-space:nowrap;
}
.sbar-logout:hover{
  background:rgba(239,68,68,0.22);
  box-shadow:0 0 12px rgba(239,68,68,0.2);

<script>
// ─────────────────────────────────────────────────────────
// SHIM: google.script.run  →  fetch('/api/<fungsi>')
// Dipasang agar SEMUA kode lama yang memanggil
//   google.script.run.withSuccessHandler(fn).withFailureHandler(fn).namaFungsi(arg1, arg2, ...)
// tetap berjalan tanpa diubah satu pun, hanya backend-nya yang
// pindah dari Apps Script ke Cloudflare Pages Functions.
// ─────────────────────────────────────────────────────────
window.google = window.google || {};
window.google.script = window.google.script || {};
Object.defineProperty(window.google.script, 'run', {
  get() {
    const handlers = {};
    const proxy = new Proxy({}, {
      get(_target, prop) {
        if (prop === 'withSuccessHandler') {
          return (fn) => { handlers.success = fn; return proxy; };
        }
        if (prop === 'withFailureHandler') {
          return (fn) => { handlers.failure = fn; return proxy; };
        }
        // prop = nama fungsi backend, misal getInventory, pinjamAlat, dst.
        return (...args) => {
          const controller = new AbortController();
          const timeoutMs = 30000; // 30 detik — kalau server tidak respon sama sekali, jangan diam selamanya
          const timer = setTimeout(() => controller.abort(), timeoutMs);
          fetch('/api/' + prop, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ args }),
            signal: controller.signal,
          })
            .then(async (res) => {
              clearTimeout(timer);
              const data = await res.json().catch(() => ({}));
              if (!res.ok && !('success' in data)) {
                throw new Error(data.message || ('HTTP ' + res.status));
              }
              if (handlers.success) handlers.success(data);
            })
            .catch((err) => {
              clearTimeout(timer);
              const isTimeout = err.name === 'AbortError';
              const finalErr = isTimeout
                ? new Error('Server tidak merespon dalam ' + (timeoutMs/1000) + ' detik (kemungkinan macet di backend/Google API).')
                : err;
              if (handlers.failure) handlers.failure(finalErr);
              else console.error('google.script.run error:', finalErr);
            });
        };
      },
    });
    return proxy;
  },
});

function fmtDate(v){
  if(!v||v==='-'||v==='') return '-';
  try{
    if(/^\d+(\.\d+)?$/.test(String(v).trim())){
      const serial = parseFloat(v);
      const ms = Math.round((serial - 25569) * 86400 * 1000);
      const d = new Date(ms);
      if(!isNaN(d)) return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
    }
    const d = new Date(v);
    if(isNaN(d)) return v;
    return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  }catch{ return v; }
}

// Khusus untuk tanggal "deadline" (Rencana Kembali) yang sifatnya per-hari,
// bukan timestamp presisi-menit. Sengaja TIDAK menampilkan jam supaya tidak
// kena masalah geser timezone akibat cara Google Sheets menyimpan tanggal
// polos (date-only) sebagai tanggal-serial berbasis timezone Sheet itu sendiri.
// Kalau value sudah berupa ISO datetime (ada "T"), kita ambil bagian tanggalnya
// saja dari potongan string sebelum "T" — supaya TIDAK ikut dikonversi lagi ke
// timezone device (yang justru bisa menggeser tanggalnya jadi h-1 / h+1).
function fmtDateOnly(v){
  if(!v||v==='-'||v==='') return '-';
  try{
    // Fallback: kalau cell di Google Sheets kehilangan format "Date" (sering
    // terjadi pada baris yang ditambahkan via values:append tanpa mewarisi
    // format kolom di atasnya), Sheets API mengembalikan SERIAL NUMBER mentah
    // (jumlah hari sejak 30 Des 1899) sebagai teks, contoh: "46200".
    // Kita deteksi & konversi manual ke tanggal yang benar.
    if(/^\d+(\.\d+)?$/.test(String(v).trim())){
      const serial = parseFloat(v);
      const ms = Math.round((serial - 25569) * 86400 * 1000); // 25569 = offset epoch 1899-12-30 → 1970-01-01
      const d = new Date(ms);
      if(!isNaN(d)) return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
    }
    const datePart = String(v).includes('T') ? String(v).split('T')[0] : String(v).split(' ')[0];
    const m = datePart.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(!m) return v;
    const d = new Date(Number(m[1]), Number(m[2])-1, Number(m[3])); // local, tanpa offset UTC
    if(isNaN(d)) return v;
    return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
  }catch{ return v; }
}

// ─────────────────────────────────────────────────────────
// 3D BACKGROUND (particle mesh)
// ─────────────────────────────────────────────────────────
function initBG(){
  const cv = $('bg-canvas');
  const cx = cv.getContext('2d');
  let W,H,pts=[];
  function resize(){ W=cv.width=innerWidth; H=cv.height=innerHeight; }
  resize(); addEventListener('resize',resize);

  const clrs=['rgba(0,212,170,','rgba(26,95,207,','rgba(245,183,49,'];
  for(let i=0;i<75;i++) pts.push({
    x:Math.random()*1400, y:Math.random()*900,
    vx:(Math.random()-.5)*.35, vy:(Math.random()-.5)*.35,
    r:Math.random()*1.8+.4, z:Math.random()*4+.5,
    c:clrs[Math.floor(Math.random()*clrs.length)]
  });

  (function frame(){
    cx.clearRect(0,0,W,H);
    for(const p of pts){
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0)p.x=W; if(p.x>W)p.x=0;
      if(p.y<0)p.y=H; if(p.y>H)p.y=0;
      cx.beginPath();
      cx.arc(p.x,p.y,p.r*p.z*.5,0,Math.PI*2);
      cx.fillStyle=p.c+(0.25*p.z/4.5)+')';
      cx.fill();
    }
    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<130){
          cx.beginPath();
          cx.moveTo(pts[i].x,pts[i].y);
          cx.lineTo(pts[j].x,pts[j].y);
          cx.strokeStyle=`rgba(0,212,170,${0.055*(1-d/130)})`;
          cx.lineWidth=.5; cx.stroke();
        }
      }
    }
    requestAnimationFrame(frame);
  })();
}

function doAdminLogin(){
  const userEl = $('adm-user');
  const pw     = $('adm-pw');
  if(!pw) return;
  const username = userEl ? userEl.value.trim() : '';
  const btn = $('btn-adm-login');
  if(btn){ btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin"></i>'; }

  google.script.run
    .withSuccessHandler(res=>{
      // Kompatibilitas: backend lama return boolean, baru return {success,isSuperAdmin,username}
      const ok = (typeof res === 'boolean') ? res : res.success;
      if(ok){
        S.isAdmin      = true;
        S.isSuperAdmin = (typeof res === 'object') ? !!res.isSuperAdmin : false;
        S.adminUsername = (typeof res === 'object' && res.username) ? res.username : username;
        if(S.isSuperAdmin) S.superAdminPw = pw.value; // simpan sementara untuk kelola akun
        closeMdl();
        toast('Login admin berhasil! Halo, ' + S.adminUsername + ' 🔓');
        updateAdminUI();
        if(S._adminDest){ S._adminDest(); S._adminDest=null; }
      } else {
        if(btn){ btn.disabled=false; btn.innerHTML='<i class="fas fa-unlock"></i> Masuk'; }
        const msg = (typeof res === 'object' && res.message) ? res.message : 'Password salah!';
        toast(msg, 'err');
        pw.value=''; pw.focus();
      }
    })
    .withFailureHandler(err=>{
      if(btn){ btn.disabled=false; btn.innerHTML='<i class="fas fa-unlock"></i> Masuk'; }
      toast(err.toString(),'err');
    })
    .verifyAdmin({ username: username, password: pw.value });
}

function submitPinjam(){
  if(!S.selItem){ toast('Pilih alat dari dropdown terlebih dahulu','wrn'); return; }

  const nama  = $('f-nama').value.trim();
  const nim   = $('f-nim').value.trim();
  const prodi = $('f-prodi').value.trim();
  const hp    = $('f-hp').value.trim();
  const jml   = Number($('f-jml').value);
  const tgl   = $('f-tgl').value;
  const kep   = $('f-kep').value.trim();

  if(!nama||!nim||!hp||!tgl){ toast('Lengkapi semua field wajib (*)','wrn'); return; }
  if(jml<1){ toast('Jumlah minimal 1','wrn'); return; }

  const stok = Number(S.selItem['Stok Tersedia']||0);
  if(jml>stok){ toast(`Jumlah melebihi stok tersedia (${stok})`,'wrn'); return; }

  const btn = $('btn-pinjam');
  btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Memproses...';

  // Closure data peminjaman agar bisa dipakai setelah upload attachment
  const dataPinjam = {
    id_alat:        S.selItem['ID Alat'],
    nama_alat:      S.selItem['Nama Alat'],
    nama_peminjam:  nama,
    nim_nip:        nim,
    prodi_instansi: prodi,
    no_hp:          hp,
    jumlah:         jml,
    tanggal_kembali:tgl,
    keperluan:      kep,
  };

  function doPinjamAlat(attachmentUrl){
    google.script.run
      .withSuccessHandler(res=>{
        btn.disabled=false; btn.innerHTML='<i class="fas fa-check"></i> Konfirmasi Peminjaman';
        const prog2 = document.getElementById('att-progress'); if(prog2) prog2.style.display='none';
        if(res.success){
          S.selItem['Stok Tersedia'] = stok - jml;
          S.inventory.find(r=>r['ID Alat']===S.selItem['ID Alat'])['Stok Tersedia'] = stok - jml;
          toast('Peminjaman berhasil dicatat!');
          modal(`
            <h3><i class="fas fa-check-circle" style="color:var(--teal)"></i> Peminjaman Berhasil!</h3>
            <p>Alat <strong>${S.selItem['Nama Alat']}</strong> telah dipinjam oleh <strong>${nama}</strong>.</p>
            <div class="success-box">
              <div class="lbl">ID Transaksi Anda</div>
              <div class="val">${res.id_transaksi}</div>
              <div class="hint">⚠ Simpan ID ini untuk proses pengembalian alat</div>
            </div>
            ${attachmentUrl ? '<div style="background:rgba(0,212,170,0.07);border:1px solid rgba(0,212,170,0.25);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;display:flex;align-items:center;gap:8px"><i class=\"fas fa-paperclip\" style=\"color:var(--teal)\"></i> Lampiran berhasil diunggah</div>' : ''}
            <div class="mdl-row">
              <button class="btn btn-o" style="flex:1" onclick="closeMdl(); requireAdmin('Kembalikan Alat', ()=>{ S.tab='kembali'; nav('peminjaman'); })">Ke Pengembalian</button>
              <button class="btn btn-p" style="flex:1" onclick="closeMdl(); nav('landing')">Menu Utama</button>
            </div>
          `);
          clearAttachment();
          S.selItem=null;
        } else {
          toast(res.message,'err');
        }
      })
      .withFailureHandler(err=>{
        btn.disabled=false; btn.innerHTML='<i class="fas fa-check"></i> Konfirmasi Peminjaman';
        const prog2 = document.getElementById('att-progress'); if(prog2) prog2.style.display='none';
        toast(err.toString(),'err');
      })
      .pinjamAlat({ ...dataPinjam, attachment_url: attachmentUrl || '' });
  }

  if(_attFile){
    // Ada lampiran → kompres jika gambar, lalu upload ke Drive
    const prog = document.getElementById('att-progress');
    const bar  = document.getElementById('att-bar');
    const sts  = document.getElementById('att-status');
    if(prog) prog.style.display='block';
    if(bar)  bar.style.width='10%';
    if(sts)  sts.textContent='Membaca file...';

    const tmpId = 'PJM-' + Date.now();
    const isImage = _attFile.type.startsWith('image/');

    function doUpload(dataUrl, mimeType, fileName) {
      if(bar) bar.style.width='55%';
      if(sts) sts.textContent='Mengupload lampiran ke Google Drive...';
      const b64 = dataUrl.split(',')[1];
      google.script.run
        .withSuccessHandler(function(upRes){
          if(!upRes.success){
            if(prog) prog.style.display='none';
            btn.disabled=false; btn.innerHTML='<i class="fas fa-check"></i> Konfirmasi Peminjaman';
            toast('Gagal upload lampiran: '+upRes.message,'err'); return;
          }
          if(bar) bar.style.width='85%';
          if(sts) sts.textContent='Menyimpan data peminjaman...';
          doPinjamAlat(upRes.url);
        })
        .withFailureHandler(function(err){
          if(prog) prog.style.display='none';
          btn.disabled=false; btn.innerHTML='<i class="fas fa-check"></i> Konfirmasi Peminjaman';
          toast('Error upload: '+err,'err');
        })
        .uploadAttachment(b64, fileName, mimeType, tmpId);
    }

    function compressImage(file, callback) {
      if(sts) sts.textContent='Mengompres gambar...';
      if(bar) bar.style.width='25%';
      const reader = new FileReader();
      reader.onload = function(ev){
        const img = new Image();
        img.onload = function(){
          // Target maks 1200px dan kualitas 0.75
          const MAX = 1200;
          let w = img.width, h = img.height;
          if(w > MAX || h > MAX){
            if(w > h){ h = Math.round(h * MAX / w); w = MAX; }
            else      { w = Math.round(w * MAX / h); h = MAX; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          const compressed = canvas.toDataURL('image/jpeg', 0.75);
          if(sts) sts.textContent='Kompresi selesai, mengupload...';
          if(bar) bar.style.width='45%';
          callback(compressed, 'image/jpeg', file.name.replace(/\.[^.]+$/, '.jpg'));
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }

    if(isImage){
      // Kompres dulu sebelum upload
      compressImage(_attFile, doUpload);
    } else {
      // PDF/file lain → langsung upload tanpa kompres
      if(sts) sts.textContent='Membaca file PDF...';
      const reader = new FileReader();
      reader.onload = function(ev){
        doUpload(ev.target.result, _attFile.type, _attFile.name);
      };
      reader.readAsDataURL(_attFile);
    }

  } else {
    // Tidak ada lampiran → langsung submit
    doPinjamAlat('');
  }
}

// ── Attachment helpers ──────────────────────────────────────
let _attFile = null; // File object yang dipilih user

function onFileSelect(input){
  const file = input.files[0];
  if(file) setAttFile(file);
}

function handleAttDrop(e){
  e.preventDefault();
  const drop = document.getElementById('att-drop');
  drop.style.borderColor='var(--border)'; drop.style.background='';
  const file = e.dataTransfer.files[0];
  if(file) setAttFile(file);
}

function setAttFile(file){
  const MAX = 10 * 1024 * 1024; // 10 MB
  const allowed = ['application/pdf','image/jpeg','image/png','image/jpg'];
  if(!allowed.includes(file.type)){
    toast('Format file tidak didukung. Gunakan PDF, JPG, atau PNG.','wrn'); return;
  }
  if(file.size > MAX){
    toast('Ukuran file melebihi 10 MB.','wrn'); return;
  }
  _attFile = file;
  const prev = document.getElementById('att-preview');
  document.getElementById('att-fname').textContent = file.name;
  document.getElementById('att-fsize').textContent = (file.size/1024).toFixed(1) + ' KB · ' + file.type;
  prev.style.display = 'flex';
  const drop = document.getElementById('att-drop');
  drop.style.borderColor = 'var(--teal)';
  drop.style.background  = 'rgba(0,212,170,0.04)';
}

function clearAttachment(){
  _attFile = null;
  const fi = document.getElementById('p-file'); if(fi) fi.value='';
  const prev = document.getElementById('att-preview'); if(prev) prev.style.display='none';
  const drop = document.getElementById('att-drop');
  if(drop){ drop.style.borderColor='var(--border)'; drop.style.background=''; }
  const prog = document.getElementById('att-progress'); if(prog) prog.style.display='none';
}


function doKembalikan(idTrans, penerima, kondisi, keterangan, attachmentUrl){
  const btn  = document.getElementById('btn-kembali');
  // Catatan: form Kembalikan Alat TIDAK punya elemen att-progress/att-bar/att-status
  // (elemen itu hanya ada di form Pinjam Alat). Selalu null-check di sini —
  // kalau tidak, error "Cannot set properties of null" akan terlempar duluan
  // dan menghentikan success/failure handler sebelum sempat me-reset tombol,
  // sehingga tombol macet di "Memproses..." walau data sudah tersimpan di server.
  const prog = document.getElementById('att-progress');

  google.script.run
    .withSuccessHandler(res=>{
      if(prog) prog.style.display='none';
      btn.disabled=false; btn.innerHTML='<i class="fas fa-check-circle"></i> Konfirmasi Pengembalian';
      if(res.success){
        toast('Pengembalian berhasil dicatat!');
        S.loaded=false;
        document.getElementById('r-id').value='';
        document.getElementById('r-ket').value='';
        document.getElementById('r-penerima').value='';
        document.getElementById('r-kondisi').value='';
        clearAttachment();
      } else {
        toast(res.message,'err');
      }
    })
    .withFailureHandler(err=>{
      if(prog) prog.style.display='none';
      btn.disabled=false; btn.innerHTML='<i class="fas fa-check-circle"></i> Konfirmasi Pengembalian';
      toast(err.toString(),'err');
    })
    .kembalikanAlat({
      id_transaksi:   idTrans,
      nama_penerima:  penerima,
      kondisi_barang: kondisi,
      keterangan:     keterangan,
      attachment_url: attachmentUrl || ''
    });
}

function submitKembali(){
  const id       = $('r-id').value.trim();
  const penerima = $('r-penerima').value.trim();
  const kondisi  = $('r-kondisi').value;
  const ket      = $('r-ket').value.trim();

  if(!id)       { toast('Masukkan ID Transaksi','wrn'); return; }
  if(!penerima) { toast('Masukkan nama penerima','wrn'); return; }
  if(!kondisi)  { toast('Pilih kondisi barang saat dikembalikan','wrn'); return; }

  const btn = $('btn-kembali');
  btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Memproses...';

  // Langsung submit pengembalian tanpa lampiran
  doKembalikan(id, penerima, kondisi, ket, '');
}

// ─────────────────────────────────────────────────────────
// 3. HISTORY LOG (Admin Only)
// ─────────────────────────────────────────────────────────
let _hist=[];
function renderHistory(){
  setMain(`
    <div class="pg-hdr">
      <button class="btn-back" onclick="nav('landing')"><i class="fas fa-arrow-left"></i></button>
      <h2><i class="fas fa-history"></i> History Log Transaksi</h2>
      <span class="badge b-admin" style="margin-left:auto"><i class="fas fa-shield-alt"></i> Admin</span>
    </div>
    <div class="srch">
      <input id="srch-in" type="text" placeholder="Cari nama, NIM/NIP, ID Transaksi, nama alat..." oninput="filterHist()"/>
    </div>
    <div id="hist-wrap"><div class="ld"><div class="spin"></div><p>Memuat data...</p></div></div>
  `);
  loadHist();
}

function loadHist(){
  google.script.run
    .withSuccessHandler(res=>{
      if(!res.success){ $('hist-wrap').innerHTML=`<p style="color:var(--red)">${res.message}</p>`; return; }
      _hist=res.data;
      renderHistTbl(_hist);
    })
    .withFailureHandler(err=>{ $('hist-wrap').innerHTML=`<p style="color:var(--red)">Error: ${err}</p>`; })
    .getTransaksi({});
}

function filterHist(){
  const kw=$('srch-in').value.toLowerCase();
  if(!kw){ renderHistTbl(_hist); return; }
  renderHistTbl(_hist.filter(r=>Object.values(r).some(v=>String(v).toLowerCase().includes(kw))));
}

function renderHistTbl(data){
  const wrap=$('hist-wrap');
  if(!data||!data.length){
    wrap.innerHTML=`<div class="empty"><i class="fas fa-inbox"></i>Belum ada data transaksi</div>`;
    return;
  }
  wrap.innerHTML=`
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>ID Transaksi</th><th>Nama Peminjam</th><th>NIM/NIP</th>
          <th>Alat</th><th>Jml</th><th>Tgl Pinjam</th>
          <th>Rencana Kembali</th><th>Dikembalikan</th>
          <th>Penerima</th><th>Kondisi Pengembalian</th>
          <th>Lampiran</th><th>Status</th>
        </tr></thead>
        <tbody>
          ${data.map(r=>{
            const attUrl = r['Attachment URL'] || '';
            const attCell = attUrl
              ? `<a href="${attUrl}" target="_blank" rel="noopener"
                    style="display:inline-flex;align-items:center;gap:5px;
                           color:var(--teal);font-size:12px;text-decoration:none;
                           background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.3);
                           border-radius:6px;padding:3px 8px;white-space:nowrap"
                    title="Buka lampiran di Google Drive">
                   <i class="fas fa-file-alt"></i> Lihat
                 </a>`
              : `<span style="color:var(--muted);font-size:11px">—</span>`;

            const kondisi = r['Kondisi Pengembalian'] || '';
            let kondisiCell = `<span style="color:var(--muted)">—</span>`;
            if(kondisi){
              const color = kondisi.includes('Rusak') ? 'b-err'
                          : kondisi.includes('Perlu') ? 'b-warn'
                          : kondisi === 'Hilang'      ? 'b-err'
                          : 'b-ok';
              kondisiCell = `<span class="badge ${color}">${kondisi}</span>`;
            }

            return `<tr>
              <td style="font-family:var(--mono);font-size:11px">${r['ID Transaksi']||'-'}</td>
              <td>${r['Nama Peminjam']||'-'}</td>
              <td>${r['NIM/NIP']||'-'}</td>
              <td>${r['Nama Alat']||'-'}</td>
              <td style="text-align:center">${r['Jumlah']||'-'}</td>
              <td style="white-space:nowrap">${fmtDate(r['Tanggal Pinjam'])}</td>
              <td style="white-space:nowrap">${fmtDateOnly(r['Rencana Kembali'])}</td>
              <td style="white-space:nowrap">${fmtDate(r['Tanggal Dikembalikan'])}</td>
              <td>${r['Nama Penerima']||'<span style="color:var(--muted)">—</span>'}</td>
              <td>${kondisiCell}</td>
              <td>${attCell}</td>
              <td>${statusBadge(r['Status'])}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <p style="text-align:right;color:var(--muted);font-size:12px;margin-top:8px">Total: ${data.length} transaksi</p>
  `;
}

// 4. INPUT MATERIAL (Admin Only)
// ─────────────────────────────────────────────────────────
function renderMaterial(){
  setMain(`
    <div class="pg-hdr">
      <button class="btn-back" onclick="nav('landing')"><i class="fas fa-arrow-left"></i></button>
      <h2><i class="fas fa-boxes-stacked"></i> Input Material / Alat</h2>
      <span class="badge b-admin" style="margin-left:auto"><i class="fas fa-shield-alt"></i> Admin</span>
    </div>

    <div class="card">
      <div class="card-ttl"><i class="fas fa-plus-circle"></i> Tambah Alat Baru ke Inventaris</div>
      <div class="fgrid">
        <div class="fg">
          <label>ID Alat * <span style="font-weight:400;color:var(--muted)">(unik, cth: ALT-001)</span></label>
          <input id="m-id" type="text" placeholder="ALT-001" style="font-family:var(--mono)"/>
        </div>
        <div class="fg">

        </div>
        <div class="fg">
          <label>Kategori</label>
          <div class="sel-wrap">
            <select id="m-kat">
              <option>Alat Ukur</option>
              <option>Alat Gelas</option>
              <option>Elektronik</option>
              <option>Optik</option>
              <option>Mekanik</option>
              <option>Keselamatan</option>
              <option>Komputer</option>
              <option>Lainnya</option>
            </select>
            <i class="fas fa-chevron-down sel-arrow"></i>
          </div>
        </div>
        <div class="fg">
          <label>Jumlah Total *</label>
          <input id="m-jml" type="number" min="1" value="1"/>

        <div class="fg">
          <label>Satuan</label>

              <option>unit</option><option>buah</option>
              <option>set</option><option>pasang</option><option>lusin</option>

          </div>
        </div>
        <div class="fg">
          <label>Kondisi Awal</label>
          <div class="sel-wrap">
            <select id="m-kond">
              <option>Baik</option>
              <option>Perlu Perawatan</option>
              <option>Rusak Ringan</option>
              <option>Rusak Berat</option>
            </select>
            <i class="fas fa-chevron-down sel-arrow"></i>
          </div>
        </div>
        <div class="fg">
          <label>Lokasi / Rak Penyimpanan</label>
          <input id="m-lok" type="text" placeholder="Contoh: Rak A-3"/>
        </div>

          <label>Spesifikasi / Keterangan</label>
          <textarea id="m-ket" placeholder="Spesifikasi teknis, merek, kapasitas, catatan..."></textarea>
        </div>
      </div>
      <button class="btn btn-s btn-full mt" id="btn-mat" onclick="submitMaterial()">
        <i class="fas fa-save"></i> Simpan ke Inventaris

      <div class="card-ttl"><i class="fas fa-list-ul"></i> Inventaris Saat Ini</div>
      <div id="inv-tbl"><div class="ld"><div class="spin"></div></div></div>
    </div>
  `);
  loadInvTbl();
}

function loadInvTbl(){
  google.script.run
    .withSuccessHandler(res=>{
      const w=$('inv-tbl');
      if(!res.success||!res.data.length){
        w.innerHTML=`<div class="empty"><i class="fas fa-inbox"></i>Belum ada data inventaris</div>`; return;
      }
      S.inventory=res.data; S.loaded=true;
      w.innerHTML=`
        <div class="tbl-wrap">
          <table>
            <thead><tr>
              <th>ID Alat</th><th>Nama Alat</th><th>Kategori</th>
              <th>Total</th><th>Tersedia</th><th>Satuan</th>
              <th>Kondisi</th><th>Lokasi</th>
            </tr></thead>
            <tbody>
              ${res.data.map(r=>`<tr>
                <td style="font-family:var(--mono);font-size:11px">${r['ID Alat']||'-'}</td>
                <td>${r['Nama Alat']||'-'}</td>
                <td>${r['Kategori']||'-'}</td>
                <td style="text-align:center">${r['Jumlah Total']||0}</td>
                <td style="text-align:center">${stokBadge(r['Stok Tersedia'])}</td>
                <td>${r['Satuan']||'-'}</td>
                <td>${r['Kondisi']||'-'}</td>
                <td>${r['Lokasi']||'-'}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    })
    .withFailureHandler(err=>{ $('inv-tbl').innerHTML=`<p style="color:var(--red)">Error: ${err}</p>`; })
    .getInventory();
}

function submitMaterial(){
  const id   = $('m-id').value.trim().toUpperCase();
  const nama = $('m-nama').value.trim();
  const jml  = Number($('m-jml').value);
  if(!id||!nama){ toast('ID Alat dan Nama Alat wajib diisi','wrn'); return; }
  if(jml<1)     { toast('Jumlah minimal 1','wrn'); return; }

  const btn=$('btn-mat');
  btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Menyimpan...';

  google.script.run
    .withSuccessHandler(res=>{
      btn.disabled=false; btn.innerHTML='<i class="fas fa-save"></i> Simpan ke Inventaris';
      if(res.success){
        toast(res.message);
        ['m-id','m-nama','m-lok','m-ket'].forEach(id=>{ const el=$(id); if(el) el.value=''; });
        $('m-jml').value=1;
        S.loaded=false;
        loadInvTbl();
      } else {
        toast(res.message,'err');
      }
    })
    .withFailureHandler(err=>{
      btn.disabled=false;
      toast(err.toString(),'err');
    })
    .addInventoryItem({
      id_alat:     id,
      nama_alat:   nama,
      kategori:    $('m-kat').value,
      jumlah_total:jml,
      satuan:      $('m-sat').value,
      kondisi:     $('m-kond').value,
      lokasi:      $('m-lok').value.trim(),
      keterangan:  $('m-ket').value.trim(),
    });
}

// 5. KELOLA AKUN ADMIN (Super-Admin Only)
// ─────────────────────────────────────────────────────────
let _adminList = [];

function renderAdminMgmt(){
  setMain(`
    <div class="pg-hdr">
      <button class="btn-back" onclick="nav('landing')"><i class="fas fa-arrow-left"></i></button>
      <h2><i class="fas fa-users-gear"></i> Kelola Akun Admin</h2>
      <span class="badge" style="margin-left:auto;background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,.3)">
        <i class="fas fa-crown"></i> Super-Admin
      </span>
    </div>

    <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;
                background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.22);
                border-radius:10px;padding:10px 14px;font-size:13px;color:#f87171">
      <i class="fas fa-shield-alt"></i>
      <span>Login sebagai <strong>${S.adminUsername}</strong> (Super-Admin) — dapat membuat dan menghapus akun admin</span>

    <!-- Form Buat Akun Baru -->
    <div class="card">
      <div class="card-ttl"><i class="fas fa-user-plus"></i> Buat Akun Admin Baru</div>
      <div class="fgrid">
        <div class="fg">
          <label>Username <span style="font-weight:400;color:var(--muted);text-transform:none">(huruf kecil, angka, . _)</span></label>
          <input id="na-user" type="text" placeholder="cth: admin.lab1"
                 style="font-family:var(--mono)"
                 oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9_.]/g,'')"/>
        </div>
        <div class="fg">
          <label>Password <span style="font-weight:400;color:var(--muted);text-transform:none">(minimal 6 karakter)</span></label>
          <div style="position:relative">
            <input id="na-pass" type="password" placeholder="Password akun baru"/>
            <button onclick="togglePw('na-pass','eye-np')"
                    style="position:absolute;right:10px;top:50%;transform:translateY(-50%);
                           background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px">
              <i id="eye-np" class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <div class="fg">
          <label>Konfirmasi Password</label>
          <div style="position:relative">
            <input id="na-pass2" type="password" placeholder="Ulangi password"
                   onkeydown="if(event.key==='Enter') submitCreateAdmin()"/>
            <button onclick="togglePw('na-pass2','eye-np2')"
                    style="position:absolute;right:10px;top:50%;transform:translateY(-50%);
                           background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px">
              <i id="eye-np2" class="fas fa-eye"></i>
            </button>
          </div>
        </div>
      </div>
      <button class="btn btn-s mt" id="btn-create-adm" onclick="submitCreateAdmin()">
        <i class="fas fa-user-plus"></i> Buat Akun Admin
      </button>
    </div>

    <!-- Daftar Akun Admin -->
    <div class="card">
      <div class="card-ttl" style="justify-content:space-between">
        <span><i class="fas fa-list-ul"></i> Daftar Akun Admin</span>
        <button onclick="loadAdminList()" style="background:none;border:none;color:var(--teal);
                cursor:pointer;font-size:12px"><i class="fas fa-sync-alt"></i> Refresh</button>

      <!-- Super-admin row (permanent) -->
      <div style="display:flex;align-items:center;gap:12px;padding:12px 0;

                    border:1px solid rgba(239,68,68,.3);display:flex;align-items:center;
                    justify-content:center;color:#f87171;flex-shrink:0">
          <i class="fas fa-crown" style="font-size:14px"></i>
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-family:var(--mono);font-size:13px">${S.adminUsername}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">Super-Admin · Akun permanen, tidak dapat dihapus</div>
        </div>
        <span class="badge" style="background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,.25);flex-shrink:0">

function togglePw(inputId, iconId){
  const inp = $(inputId); const ico = $(iconId);
  if(!inp||!ico) return;
  if(inp.type==='password'){ inp.type='text'; ico.className='fas fa-eye-slash'; }
  else { inp.type='password'; ico.className='fas fa-eye'; }
}

function loadAdminList(){
  const wrap = $('admin-list-wrap');
  if(wrap) wrap.innerHTML='<div class="ld"><div class="spin"></div><p>Memuat...</p></div>';

  google.script.run
    .withSuccessHandler(res=>{
      if(!res.success){ if(wrap) wrap.innerHTML=`<p style="color:var(--red);padding:12px 0">${res.message}</p>`; return; }
      _adminList = res.data;
      renderAdminListTbl(_adminList);
    })
    .withFailureHandler(err=>{ if(wrap) wrap.innerHTML=`<p style="color:var(--red)">Error: ${err}</p>`; })
    .getAdminAccounts();
}

function renderAdminListTbl(list){
  const wrap = $('admin-list-wrap');
  if(!wrap) return;

  if(!list||!list.length){
    wrap.innerHTML=`
      <div style="text-align:center;padding:32px;color:var(--muted)">
        <i class="fas fa-user-slash" style="font-size:32px;opacity:0.2;display:block;margin-bottom:10px"></i>
        Belum ada akun admin tambahan
      </div>`;
    return;
  }

  wrap.innerHTML = list.map((a,i)=>`
    <div style="display:flex;align-items:center;gap:12px;padding:12px 0;
                border-bottom:1px solid var(--border);animation:fadeUp .2s ease ${i*0.05}s both">
      <div style="width:36px;height:36px;border-radius:50%;background:rgba(0,212,170,0.12);
                  border:1px solid rgba(0,212,170,.25);display:flex;align-items:center;
                  justify-content:center;color:var(--teal);flex-shrink:0">
        <i class="fas fa-user-shield" style="font-size:14px"></i>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-family:var(--mono);font-size:13px">${a.username}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">
          <i class="fas fa-clock" style="margin-right:4px"></i>Dibuat: ${a.createdAt||'-'}
        </div>
      </div>
      <button onclick="confirmDeleteAdmin('${a.username}')"
              style="background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,.3);
                     color:#f87171;border-radius:8px;padding:7px 13px;cursor:pointer;
                     font-size:12px;font-weight:700;transition:all .2s;flex-shrink:0"
              onmouseover="this.style.background='rgba(239,68,68,0.25)'"
              onmouseout="this.style.background='rgba(239,68,68,0.12)'">
        <i class="fas fa-trash-alt"></i> Hapus
      </button>
    </div>
  `).join('');
}

function submitCreateAdmin(){
  const uname = $('na-user').value.trim();
  const pass  = $('na-pass').value;
  const pass2 = $('na-pass2').value;

  if(!uname)       { toast('Username tidak boleh kosong','wrn'); return; }
  if(!pass)        { toast('Password tidak boleh kosong','wrn'); return; }
  if(pass.length<6){ toast('Password minimal 6 karakter','wrn'); return; }
  if(pass!==pass2) { toast('Konfirmasi password tidak cocok','wrn'); return; }

  const btn=$('btn-create-adm');
  btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Menyimpan...';

  google.script.run
    .withSuccessHandler(res=>{
      btn.disabled=false; btn.innerHTML='<i class="fas fa-user-plus"></i> Buat Akun Admin';
      if(res.success){
        toast(res.message);
        $('na-user').value=''; $('na-pass').value=''; $('na-pass2').value='';
        loadAdminList();
      } else {
        toast(res.message,'err');
      }
    })
    .withFailureHandler(err=>{
      btn.disabled=false; btn.innerHTML='<i class="fas fa-user-plus"></i> Buat Akun Admin';
      toast(err.toString(),'err');
    })
    .createAdminAccount(S.superAdminPw, uname, pass);
}

function confirmDeleteAdmin(username){
  modal(`
    <div style="text-align:center;margin-bottom:18px">
      <div style="width:56px;height:56px;background:rgba(239,68,68,0.15);border:2px solid rgba(239,68,68,0.4);
                  border-radius:50%;display:flex;align-items:center;justify-content:center;
                  margin:0 auto 14px;font-size:22px">🗑️</div>
      <h3 style="margin-bottom:6px">Hapus Akun Admin?</h3>
      <p style="color:var(--muted);font-size:13px;line-height:1.6">
        Akun <span style="font-family:var(--mono);color:#f87171;font-weight:700">${username}</span>

      </p>
    </div>
    <div class="mdl-row">
      <button class="btn btn-o" style="flex:1" onclick="closeMdl()">Batal</button>

              onclick="doDeleteAdmin('${username}')">
        <i class="fas fa-trash-alt"></i> Ya, Hapus
      </button>
    </div>
  `);
}

function doDeleteAdmin(username){
  closeMdl();
  google.script.run
    .withSuccessHandler(res=>{
      if(res.success){ toast(res.message); loadAdminList(); }
      else { toast(res.message,'err'); }
    })
    .withFailureHandler(err=>{ toast(err.toString(),'err'); })
    .deleteAdminAccount(S.superAdminPw, username);
}

// ─────────────────────────────────────────────────────────
// THEME (dark / light)
// ─────────────────────────────────────────────────────────
function applyThemeIcon(){
  const t = document.documentElement.getAttribute('data-theme') || 'dark';
  const ic = $('theme-icon');
  if(ic) ic.className = t === 'light' ? 'fas fa-moon' : 'fas fa-sun';
}
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = cur === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  try{ localStorage.setItem('site-theme', next); }catch(e){}
  applyThemeIcon();
}

// ─────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  $('yr').textContent = new Date().getFullYear();
  applyThemeIcon();
  initBG();
  clock();
  updateAdminUI();
  render();
});
